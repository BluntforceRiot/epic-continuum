name: Epic Continuum CI

"on":
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - name: Show interpreter
        run: python --version
      - name: Install project under test
        run: |
          python -m pip install --upgrade pip "setuptools>=77"
          python -m pip install --no-deps --no-build-isolation -e .
      - name: Compile source and tests
        run: python -m compileall -q src tests
      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  package-smoke:
    name: Build, install, and bundle smoke
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
      - name: Install build tooling
        run: python -m pip install --upgrade pip setuptools wheel
      - name: Build wheel and source distribution
        shell: bash
        run: |
          rm -rf dist build src/*.egg-info
          mkdir -p dist
          python -m pip wheel . -w dist --no-deps --no-build-isolation
          python -c "import setuptools.build_meta as backend; backend.build_sdist('dist')"
      - name: Clean wheel install and CLI handoff smoke
        shell: bash
        run: |
          python -m venv /tmp/continuum-ci-wheel-venv
          /tmp/continuum-ci-wheel-venv/bin/python -m pip install --no-index --find-links dist epic-continuum-memory
          ROOT="${RUNNER_TEMP}/continuum-wheel-root"
          BUNDLE="${RUNNER_TEMP}/continuum-wheel-root.zip"
          /tmp/continuum-ci-wheel-venv/bin/continuum init --root "$ROOT"
          /tmp/continuum-ci-wheel-venv/bin/continuum status --root "$ROOT"
          /tmp/continuum-ci-wheel-venv/bin/continuum audit-secrets --root "$ROOT"
          /tmp/continuum-ci-wheel-venv/bin/continuum verify-root --root "$ROOT" --no-restore-drill
          /tmp/continuum-ci-wheel-venv/bin/continuum pack-root --root "$ROOT" --out "$BUNDLE" --no-restore-drill
          /tmp/continuum-ci-wheel-venv/bin/continuum verify-bundle --path "$BUNDLE"
          /tmp/continuum-ci-wheel-venv/bin/python -c "from importlib.resources import files; assert files('continuum').joinpath('assets/schemas/root_bundle_manifest.schema.json').is_file()"
      - name: Clean source-distribution install smoke
        shell: bash
        run: |
          python -m venv /tmp/continuum-ci-sdist-venv
          /tmp/continuum-ci-sdist-venv/bin/python -m pip install --upgrade pip "setuptools>=77" wheel
          /tmp/continuum-ci-sdist-venv/bin/python -m pip install --no-build-isolation dist/epic_continuum_memory-*.tar.gz
          ROOT="${RUNNER_TEMP}/continuum-sdist-root"
          /tmp/continuum-ci-sdist-venv/bin/continuum init --root "$ROOT"
          /tmp/continuum-ci-sdist-venv/bin/continuum status --root "$ROOT"
          /tmp/continuum-ci-sdist-venv/bin/continuum verify-root --root "$ROOT" --no-restore-drill
          /tmp/continuum-ci-sdist-venv/bin/python -c "from importlib.resources import files; assert files('continuum').joinpath('assets/schemas/root_bundle_manifest.schema.json').is_file()"
      - name: Write distribution checksums
        shell: bash
        run: sha256sum dist/*.whl dist/*.tar.gz > dist/SHA256SUMS
      - name: Verify Git modes and line endings
        shell: bash
        run: |
          test "$(git ls-files -s -- scripts/install_codex_plugin.sh | awk '{print $1}')" = "100755"
          test "$(git ls-files -s -- scripts/install_hermes_adapter.sh | awk '{print $1}')" = "100755"
          test "$(git ls-files -s -- scripts/build_release_package.py | awk '{print $1}')" = "100644"

          if git ls-files --eol | grep -q 'w/mixed'; then
            echo "Mixed line endings detected:"
            git ls-files --eol | grep 'w/mixed'
            exit 1
          fi
      - name: Smoke installer wrappers
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/codex-stage-sh" "${RUNNER_TEMP}/codex-stage-ps"
          echo keep > "${RUNNER_TEMP}/codex-stage-sh/keep.txt"
          echo keep > "${RUNNER_TEMP}/codex-stage-ps/keep.txt"

          bash scripts/install_codex_plugin.sh \
            --stage-root "${RUNNER_TEMP}/codex-stage-sh" \
            --root "${RUNNER_TEMP}/continuum-codex-sh" \
            --python python \
            --stage-only
          test -f "${RUNNER_TEMP}/codex-stage-sh/keep.txt"
          test -f "${RUNNER_TEMP}/codex-stage-sh"/epic-continuum/plugins/continuum/.mcp.json

          bash scripts/install_hermes_adapter.sh \
            --root "${RUNNER_TEMP}/continuum-hermes-sh" \
            --hermes-home "${RUNNER_TEMP}/hermes-sh" \
            --python python \
            --dry-run \
            --skip-enable

          if command -v pwsh >/dev/null 2>&1; then
            pwsh -NoProfile -File scripts/install_codex_plugin.ps1 \
              -StageRoot "${RUNNER_TEMP}/codex-stage-ps" \
              -Root "${RUNNER_TEMP}/continuum-codex-ps" \
              -Python python \
              -StageOnly
            test -f "${RUNNER_TEMP}/codex-stage-ps/keep.txt"
            test -f "${RUNNER_TEMP}/codex-stage-ps"/epic-continuum/plugins/continuum/.mcp.json

            pwsh -NoProfile -File scripts/install_hermes_adapter.ps1 \
              -Root "${RUNNER_TEMP}/continuum-hermes-ps" \
              -HermesHome "${RUNNER_TEMP}/hermes-ps" \
              -Python python \
              -DryRun \
              -SkipEnable
          else
            echo "pwsh not available; PowerShell wrapper smoke skipped"
          fi
      - name: Build public release archive
        shell: bash
        run: |
          python scripts/build_release_package.py --out-dir dist
          python - <<'PY'
          import tomllib
          import zipfile
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          prefix = f"epic-continuum-{version}/"
          archive = Path(f"dist/epic-continuum-{version}.zip")
          with zipfile.ZipFile(archive) as zf:
              names = zf.namelist()
              assert all(name.startswith(prefix) for name in names)
              assert f"{prefix}docs/GITHUB_PUBLICATION_DRAFT.md" not in names
              for name in (
                  f"{prefix}scripts/install_codex_plugin.sh",
                  f"{prefix}scripts/install_hermes_adapter.sh",
              ):
                  mode = (zf.getinfo(name).external_attr >> 16) & 0o777
                  assert mode == 0o755, (name, oct(mode))
              name = f"{prefix}scripts/build_release_package.py"
              mode = (zf.getinfo(name).external_attr >> 16) & 0o777
              assert mode == 0o644, (name, oct(mode))
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: epic-continuum-distributions
          path: dist/*
